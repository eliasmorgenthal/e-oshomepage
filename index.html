<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-OS Homepage</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  background:linear-gradient(135deg,#8fd3ff,#2d5bff,#5b1aa8);
  min-height:100vh;

  user-select: none;
  -webkit-user-select: none;
  -ms-user-select: none;
}

.wrapper{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
  display:flex;
  gap:20px;
}

.content{ flex:2; }

h1{ font-size:40px; }

.card{
  background:rgba(0,0,0,0.35);
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
}

.card button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:rgba(255,255,255,0.15);
  color:white;
  font-size:14px;
  transition:0.2s;
}

.card button:hover{
  background:rgba(255,255,255,0.3);
}

.side-panel{
  width:220px;
  background:rgba(0,0,0,0.4);
  padding:15px;
  border-radius:12px;
}

.side-panel button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.game-area{
  margin-top:15px;
  background:rgba(0,0,0,0.3);
  padding:15px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="content">
    <h1>E-OS</h1>
    <p>Homepage</p>

    <div class="card">
      <h2>Welcome</h2>
      <p>Welcome to E-OS. This is your central dashboard for apps, updates, and tools.</p>
    </div>

    <div class="card">
      <h2>Quick Access</h2>
      <button onclick="window.location.href='https://eliasmorgenthal.github.io/E-OS_Changelogs/'">
        Open Changelogs
      </button>
    </div>

    <div class="card">
      <h2>Status</h2>
      <ul>
        <li>System: Online</li>
        <li>Security: Active</li>
        <li>Version: 0.0.53e</li>
      </ul>
    </div>

    <footer>© 2026, E-OS Development Team.</footer>
  </div>

  <div class="side-panel">
    <h3>Mini Games</h3>
    <button onclick="loadGame('cookie')">Cookie Clicker</button>

    <div id="gameArea" class="game-area">
      <p>Select a game</p>
    </div>
  </div>

</div>

<script>
// Load saved cookies or start at 0
let cookies = localStorage.getItem("cookies") 
  ? parseInt(localStorage.getItem("cookies")) 
  : 0;

function loadGame(game){
  const area = document.getElementById("gameArea");

  if(game === "cookie"){
    area.innerHTML = `
      <h2>Cookie Clicker</h2>
      <p>Cookies: <span id="cookies">${cookies}</span></p>
      <button onclick="addCookie()">Click 🍪</button>
      <br><br>
      <button onclick="resetCookies()">Reset</button>
    `;
  }
}

function addCookie(){
  cookies++;
  localStorage.setItem("cookies", cookies);
  document.getElementById("cookies").innerText = cookies;
}

function resetCookies(){
  cookies = 0;
  localStorage.setItem("cookies", cookies);
  document.getElementById("cookies").innerText = cookies;
}
</script>

</body>
</html>
